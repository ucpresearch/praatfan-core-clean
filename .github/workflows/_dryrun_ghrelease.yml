name: dryrun-ghrelease

# TEMPORARY: validates softprops/action-gh-release@v3 runs on Node 24 and can
# create a release + upload an asset in this repo. Dispatched manually, then
# this file and the ci-dryrun-node24 release/tag are deleted. Not part of the
# normal release flow.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dryrun:
    runs-on: ubuntu-latest
    steps:
      - name: Make a dummy asset
        run: echo "action-gh-release v3 / node24 dry run" > dryrun-asset.txt

      - name: Create throwaway prerelease + upload asset
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ci-dryrun-node24
          name: CI dry run (delete me)
          prerelease: true
          files: dryrun-asset.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
